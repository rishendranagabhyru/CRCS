<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Expense Tracker</h1>

        <div class="form-section">

            <input
                type="text"
                id="expenseName"
                placeholder="Expense Name">

            <select id="expenseCategory">
                <option value="">Select Category</option>
                <option>Food</option>
                <option>Travel</option>
                <option>Shopping</option>
                <option>Bills</option>
                <option>Other</option>
            </select>

            <input
                type="number"
                id="expenseAmount"
                placeholder="Amount">

            <input
                type="date"
                id="expenseDate">

            <button
                class="add-btn"
                onclick="addExpense()">
                Add Expense
            </button>

        </div>

        <input
            type="text"
            id="search"
            class="search-box"
            placeholder="Search Expense"
            onkeyup="searchExpense()">

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Expense Name</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="expenseTable">

            </tbody>

        </table>

        <div class="summary">

            <h2>
                Total Expenses :
                ₹<span id="totalExpense">0</span>
            </h2>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
